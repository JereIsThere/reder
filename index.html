<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>reder</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --surface-3: #232323;
    --surface-hover: #242424;
    --border: #262626;
    --border-strong: #333;
    --text: #f5f5f5;
    --text-dim: #888;
    --text-faint: #555;
    --accent: #ff5c28;
    --accent-soft: #ff7849;
    --accent-dim: rgba(255,92,40,.12);
    --accent-edge: rgba(255,92,40,.3);
    --user-bg: rgba(255,92,40,.08);
    --error: #ff4060;
    --success: #2dd66e;
    --shadow-lg: 0 20px 60px rgba(0,0,0,.5);
    --radius: 10px;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: #fff; }

  .app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 100dvh; height: 100dvh; }
  .app[hidden] { display: none !important; }

  /* ── Auth gate ───────────────────────────────────────── */
  .auth-gate {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 30%, #181010, #0a0a0a 70%);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .auth-gate.hidden { display: none; }
  .auth-card {
    width: min(380px, 100%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 28px;
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; gap: 14px;
    animation: cardIn .3s ease;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .auth-brand { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; margin-bottom: 6px; }
  .auth-brand .label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-faint); }
  .auth-brand .name { font-size: 30px; font-weight: 800; letter-spacing: -.6px; display: inline-flex; align-items: baseline; gap: 6px; }
  .auth-brand .name .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; transform: translateY(-3px); }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-form input {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: 11px 14px; border-radius: 9px; font: inherit; font-size: 14px;
    transition: border-color .15s, background .15s; width: 100%;
  }
  .auth-form input:focus { outline: none; border-color: var(--accent); background: #181818; }
  .auth-pass-wrap { position: relative; display: flex; }
  .auth-pass-wrap input { padding-right: 42px; }
  .auth-eye {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: transparent; border: 0; color: var(--text-faint); cursor: pointer;
    width: 32px; height: 32px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .auth-eye:hover { color: var(--accent); background: var(--accent-dim); }
  .auth-eye.on { color: var(--accent); }
  .auth-eye svg { width: 16px; height: 16px; }
  .auth-btn {
    background: var(--accent); color: #fff; border: 0;
    padding: 11px 14px; border-radius: 9px; font: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s, transform .1s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .auth-btn:hover { background: var(--accent-soft); }
  .auth-btn:active { transform: scale(.98); }
  .auth-btn:disabled { background: var(--surface-2); color: var(--text-faint); cursor: progress; }
  .auth-err { font-size: 12px; color: var(--error); min-height: 1em; line-height: 1.3; }
  .auth-foot { font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 4px; letter-spacing: .5px; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    transition: transform .25s ease;
  }
  .sidebar-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand-block { min-width: 0; }
  .brand {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 4px;
  }
  .brand-name {
    font-size: 22px; font-weight: 800; letter-spacing: -.5px;
    display: inline-flex; align-items: baseline; gap: 6px;
  }
  .brand-name .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; transform: translateY(-2px); }
  .brand-name .ext { color: var(--text-faint); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-left: 2px; }

  .sidebar-toggle-mobile {
    display: none;
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    align-items: center; justify-content: center;
  }

  .sidebar-body {
    padding: 18px 22px; overflow-y: auto; flex: 1;
    display: flex; flex-direction: column; gap: 18px;
    min-height: 0;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-faint);
  }
  .field input, .field select, .field textarea {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); font: inherit; font-size: 13px;
    padding: 9px 12px; border-radius: 6px;
    transition: border-color .15s, background .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent); background: #181818;
  }
  .field textarea { resize: vertical; min-height: 64px; font-family: inherit; }
  .field-hint { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

  .sessions-block { display: flex; flex-direction: column; gap: 8px; }
  .sessions-head {
    display: flex; align-items: center; justify-content: space-between;
  }
  .sessions-head label { margin: 0; }
  .icon-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all .15s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
  .icon-btn svg { width: 14px; height: 14px; }

  .sessions-list { display: flex; flex-direction: column; gap: 3px; max-height: 38vh; overflow-y: auto; padding-right: 2px; }
  .session-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    background: transparent; border: 1px solid transparent;
    transition: background .15s, border-color .15s;
    min-width: 0; position: relative;
  }
  .session-item:hover { background: var(--surface-hover); }
  .session-item.active { background: var(--accent-dim); border-color: var(--accent-edge); }
  .session-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .session-title {
    font-size: 12.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    outline: none;
  }
  .session-title[contenteditable="true"] {
    background: var(--surface-3); border-radius: 4px;
    padding: 1px 4px; margin: -1px -4px;
    overflow: visible; text-overflow: clip;
  }
  .session-sub { font-size: 10.5px; color: var(--text-faint); font-family: ui-monospace, "SF Mono", monospace; }
  .session-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .15s; }
  .session-item:hover .session-actions, .session-item.active .session-actions { opacity: 1; }
  .session-action {
    border: none; background: transparent; color: var(--text-faint); cursor: pointer;
    padding: 3px 5px; font-size: 12px; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .session-action:hover { color: var(--text); background: var(--surface-3); }
  .session-action.danger:hover { color: var(--error); }

  .sidebar-footer {
    padding: 12px 22px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-faint);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .sidebar-footer-right { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
  .signed-as {
    font-family: ui-monospace, "SF Mono", monospace;
    color: var(--text-dim); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 80px;
  }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); margin-right: 6px; transition: background .25s; }
  .status-dot.ok { background: var(--success); }
  .status-dot.err { background: var(--error); }
  .status-dot.busy { background: var(--accent); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* ── Main chat area ──────────────────────────────────────── */
  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; position: relative; }
  .topbar {
    height: 56px; padding: 0 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .menu-toggle { display: none; }
  .topbar-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .model-tag {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); white-space: nowrap;
  }

  .messages {
    flex: 1; overflow-y: auto; padding: 32px 22px 16px;
    scroll-behavior: smooth; min-height: 0;
  }
  .messages-inner { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px 30px; color: var(--text-faint); text-align: center;
  }
  .empty-icon {
    width: 60px; height: 60px; border-radius: 16px;
    background: var(--accent-dim); border: 1px solid var(--accent-edge);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 26px; margin-bottom: 18px;
    box-shadow: 0 6px 20px rgba(255,92,40,.15);
  }
  .empty-title { font-size: 18px; color: var(--text); margin-bottom: 6px; font-weight: 600; }
  .empty-sub { font-size: 13px; max-width: 360px; }

  .empty-prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; max-width: 520px; }
  .empty-prompt {
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); padding: 8px 12px; border-radius: 999px;
    font: inherit; font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .empty-prompt:hover { color: var(--text); border-color: var(--accent-edge); background: var(--surface-hover); }

  .msg { display: flex; gap: 12px; animation: fadeUp .25s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg-avatar {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    position: relative; overflow: hidden;
  }
  .msg-avatar svg { width: 17px; height: 17px; position: relative; z-index: 1; }
  .msg-avatar.user { background: linear-gradient(135deg, #ff7849, #ff5c28); }
  .msg-avatar.claude { background: linear-gradient(135deg, #e8a784, #cc785c); }
  .msg-avatar.gemini { background: linear-gradient(135deg, #4285f4 0%, #9b72cb 50%, #d96570 100%); }
  .msg-avatar.image { background: linear-gradient(135deg, #ff6b9d, #ff9a3c); }
  .msg-avatar.video { background: linear-gradient(135deg, #4ecdc4, #2596be); }
  .msg-avatar.error { background: rgba(255,64,96,.18); color: var(--error); border: 1px solid rgba(255,64,96,.4); }
  .msg-avatar.error svg { width: 15px; height: 15px; }

  .msg-body { min-width: 0; max-width: calc(100% - 50px); display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-body { align-items: flex-end; }
  .msg-meta { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
  .msg-author { font-weight: 600; color: var(--text); letter-spacing: -.1px; }
  .msg-model {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 10.5px;
    color: var(--text-faint);
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 4px;
  }
  .msg-time { font-size: 10.5px; color: var(--text-faint); }

  .msg-bubble {
    padding: 12px 16px; border-radius: 12px; font-size: 14.5px; line-height: 1.65;
    word-wrap: break-word; overflow-wrap: anywhere;
    border: 1px solid var(--border);
    position: relative;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg); border-color: var(--accent-edge);
    border-top-right-radius: 4px;
    white-space: pre-wrap;
  }
  .msg.assistant .msg-bubble {
    background: var(--surface); border-top-left-radius: 4px;
  }
  .msg.error .msg-bubble {
    background: rgba(255,64,96,.06); border-color: rgba(255,64,96,.25); color: var(--error);
    font-family: ui-monospace, "SF Mono", monospace; font-size: 12.5px;
    white-space: pre-wrap;
  }

  /* Markdown content */
  .md p { margin: 0 0 .7em; }
  .md p:last-child { margin-bottom: 0; }
  .md h1, .md h2, .md h3 { margin: .8em 0 .4em; line-height: 1.3; font-weight: 700; }
  .md h1 { font-size: 1.4em; }
  .md h2 { font-size: 1.2em; }
  .md h3 { font-size: 1.05em; }
  .md ul, .md ol { margin: .3em 0 .8em; padding-left: 1.4em; }
  .md li { margin: .15em 0; }
  .md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .md a:hover { color: var(--accent-soft); }
  .md strong { color: #fff; font-weight: 700; }
  .md em { font-style: italic; color: var(--text); }
  .md hr { border: 0; border-top: 1px solid var(--border); margin: 1em 0; }
  .md blockquote {
    border-left: 3px solid var(--accent-edge); padding: 2px 0 2px 12px;
    margin: .5em 0; color: var(--text-dim); font-style: italic;
  }
  .md code {
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    font-size: .88em;
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 4px;
    color: #ffd2b8;
  }
  .md pre {
    background: #0d0d0d; border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin: .6em 0;
    overflow-x: auto; position: relative;
    font-size: 12.5px;
  }
  .md pre code {
    background: transparent; border: 0; padding: 0; color: #e7e7e7;
    font-size: inherit;
  }
  .md pre .lang-label {
    position: absolute; top: 6px; left: 12px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-faint);
  }
  .md pre.has-lang { padding-top: 26px; }
  .code-copy {
    position: absolute; top: 6px; right: 6px;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    font: inherit; font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px; cursor: pointer;
    opacity: 0; transition: opacity .15s, color .15s, border-color .15s;
  }
  .md pre:hover .code-copy { opacity: 1; }
  .code-copy:hover { color: var(--accent); border-color: var(--accent); }
  .code-copy.copied { color: var(--success); border-color: var(--success); opacity: 1; }
  .md table { border-collapse: collapse; margin: .5em 0; font-size: .92em; }
  .md th, .md td { border: 1px solid var(--border); padding: 5px 10px; text-align: left; }
  .md th { background: var(--surface-2); }

  /* Message hover toolbar */
  .msg-tools {
    display: flex; gap: 4px; margin-top: 4px;
    opacity: 0; transition: opacity .15s;
  }
  .msg:hover .msg-tools { opacity: 1; }
  .msg-tool {
    background: transparent; border: 1px solid transparent;
    color: var(--text-faint); cursor: pointer;
    font: inherit; font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 7px; border-radius: 4px; transition: all .15s;
  }
  .msg-tool:hover { color: var(--text); border-color: var(--border); background: var(--surface); }
  .msg-tool.copied { color: var(--success); }

  .msg-media { margin-top: 8px; }
  .msg-media img, .msg-media video {
    max-width: 100%; border-radius: 10px; display: block;
    border: 1px solid var(--border); background: #000;
    cursor: zoom-in;
  }
  .msg-media video { max-height: 480px; cursor: default; }
  .msg-caption { font-size: 12px; color: var(--text-faint); margin-top: 6px; font-style: italic; }
  .slash-hint {
    display: inline-flex; gap: 4px; align-items: center;
    color: var(--accent); font-family: ui-monospace, monospace; font-size: 11.5px;
  }

  .msg-attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .msg-attachments img {
    max-width: 200px; max-height: 160px; border-radius: 8px;
    border: 1px solid var(--accent-edge); background: #000;
    cursor: zoom-in;
  }

  .typing { display: inline-flex; gap: 4px; padding: 6px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* ── Composer ────────────────────────────────────────────── */
  .composer {
    border-top: 1px solid var(--border); padding: 14px 22px 18px;
    background: var(--bg);
    padding-bottom: max(18px, env(safe-area-inset-bottom));
  }
  .composer-attachments {
    max-width: 760px; margin: 0 auto 8px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .composer-attachments:empty { display: none; }
  .attachment-chip {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 4px 8px 4px 4px; display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim);
    max-width: 220px;
  }
  .attachment-thumb {
    width: 32px; height: 32px; border-radius: 5px; object-fit: cover;
    background: var(--surface-2);
  }
  .attachment-name {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 130px;
  }
  .attachment-remove {
    border: 0; background: transparent; color: var(--text-faint); cursor: pointer;
    padding: 2px 4px; font-size: 13px;
  }
  .attachment-remove:hover { color: var(--error); }

  .composer-inner {
    max-width: 760px; margin: 0 auto;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 6px;
    display: flex; align-items: flex-end; gap: 4px;
    transition: border-color .15s, box-shadow .15s;
  }
  .composer-inner:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-dim); }
  .composer textarea {
    flex: 1; background: transparent; border: 0; color: var(--text);
    font: inherit; font-size: 14.5px; line-height: 1.55;
    padding: 10px 8px; resize: none; outline: none;
    max-height: 220px; min-height: 24px;
  }
  .attach-btn {
    background: transparent; color: var(--text-dim); border: 0;
    width: 38px; height: 38px; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .attach-btn:hover { color: var(--accent); background: var(--accent-dim); }
  .attach-btn svg { width: 18px; height: 18px; }
  .send-btn {
    background: var(--accent); color: #fff; border: 0;
    width: 38px; height: 38px; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s, transform .1s, background .15s;
  }
  .send-btn:hover { background: var(--accent-soft); }
  .send-btn:active { transform: scale(.95); }
  .send-btn:disabled { background: var(--surface-2); color: var(--text-faint); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .composer-hint {
    max-width: 760px; margin: 8px auto 0; padding: 0 4px;
    font-size: 11px; color: var(--text-faint);
    display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  kbd {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 5px; font-size: 10px; font-family: ui-monospace, monospace;
  }

  /* ── Toast ────────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 18px; border-radius: 10px;
    font-size: 13px; box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--success); }
  .toast.err { border-color: var(--error); color: var(--error); }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    display: none; align-items: center; justify-content: center;
    z-index: 200; cursor: zoom-out; padding: 30px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }

  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    opacity: 0; pointer-events: none; transition: opacity .2s;
    z-index: 40;
  }
  .backdrop.show { opacity: 1; pointer-events: auto; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: min(320px, 86vw);
      z-index: 50; transform: translateX(-100%);
      box-shadow: var(--shadow-lg);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle-mobile { display: inline-flex; }
    .menu-toggle { display: inline-flex; }
    .messages { padding: 22px 16px 12px; }
    .composer { padding: 12px 16px 16px; }
    .topbar { padding: 0 14px; }
    .empty-state { padding: 40px 16px 20px; }
  }
</style>
</head>
<body>

<!-- ── Auth gate ────────────────────────────────────── -->
<div class="auth-gate hidden" id="authGate">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="label">Sign in</span>
      <span class="name">reder<span class="dot"></span></span>
    </div>
    <form id="authForm" class="auth-form" autocomplete="on">
      <input id="authUser" type="text" placeholder="Username" autocomplete="username" required spellcheck="false" autocapitalize="off">
      <div class="auth-pass-wrap">
        <input id="authPass" type="password" placeholder="Password" autocomplete="current-password" required spellcheck="false">
        <button type="button" class="auth-eye" id="authEye" title="Show password" aria-label="Show password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="auth-btn" type="submit" id="authBtn">Enter →</button>
    </form>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-foot">Private chat · jere &amp; patrick only</div>
  </div>
</div>

<div class="app" id="app" hidden>
  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-block">
        <div class="brand">chat <span style="color:var(--accent)">·</span> via n8n</div>
        <div class="brand-name">reder<span class="dot"></span><span class="ext">v1</span></div>
      </div>
      <button class="sidebar-toggle-mobile icon-btn" id="sidebarCloseBtn" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="sidebar-body">
      <div class="field">
        <label for="webhookUrl">Webhook URL</label>
        <input id="webhookUrl" type="text" spellcheck="false" autocomplete="off">
      </div>

      <div class="field">
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <optgroup label="Anthropic">
            <option value="claude-opus-4-7">claude-opus-4-7</option>
            <option value="claude-sonnet-4-6" selected>claude-sonnet-4-6</option>
            <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
          </optgroup>
          <optgroup label="Google">
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
          </optgroup>
        </select>
      </div>

      <div class="field">
        <label for="systemPrompt">System Prompt</label>
        <textarea id="systemPrompt" spellcheck="false" placeholder="You are a helpful assistant."></textarea>
        <div class="field-hint">Applied to every new turn.</div>
      </div>

      <div class="sessions-block">
        <div class="sessions-head">
          <label>Sessions</label>
          <button class="icon-btn" id="newSessionBtn" title="New session (Ctrl+N)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <span><span class="status-dot" id="statusDot"></span><span id="statusText">idle</span></span>
      <span class="sidebar-footer-right">
        <span class="signed-as" id="signedAs"></span>
        <button class="icon-btn" id="logoutBtn" title="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </span>
    </div>
  </aside>

  <div class="backdrop" id="backdrop"></div>

  <!-- ── Main ────────────────────────────────────────── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="icon-btn menu-toggle" id="menuToggle" title="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <span class="topbar-title" id="topbarTitle">New chat</span>
        <span class="model-tag" id="currentModel">claude-sonnet-4-6</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="exportBtn" title="Export as Markdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="Clear messages in this session">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner"></div>
    </div>

    <div class="composer">
      <div class="composer-attachments" id="attachmentsPreview"></div>
      <div class="composer-inner">
        <button class="attach-btn" id="attachBtn" title="Attach image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5l-8.5 8.5a5.5 5.5 0 11-7.78-7.78l9.19-9.19a3.5 3.5 0 014.95 4.95L9.7 18.13a1.5 1.5 0 11-2.12-2.12l8.49-8.49"/></svg>
        </button>
        <input id="fileInput" type="file" accept="image/*" multiple style="display:none">
        <textarea id="input" rows="1" placeholder="Type a message…  (try /image or /video)" autofocus></textarea>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="composer-hint">
        <span>
          <kbd>Enter</kbd> send · <kbd>Shift</kbd>+<kbd>Enter</kbd> newline ·
          <span class="slash-hint">/image</span>
          <span class="slash-hint">/video</span>
        </span>
        <span id="modelHint"></span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
(() => {
  "use strict";

  // ── Auth config (rotate by swapping salt+hash, see README) ───
  const AUTH_USERS = {
    jere:    { salt: "3711e0b73b9008c0", hash: "8de5c3bfb39e39e33e8f6e359462ab746b3edeeaa8a1456e38a556d875a7480d" },
    patrick: { salt: "4348e47536ba1586", hash: "12ef8ee02da4edc42ae26311505a541c10406375419db738124393533cfcc395" },
    mamer:   { salt: "0a9dbea40dceb857", hash: "de41da3aa2628af61d86dfc200bb5e156ba09d63ce48b2e6d1c7c0f183f2ecdf" },
    paper:   { salt: "a009e47e5785ad17", hash: "bb1924ef94bd29ccc35de32e9601b3cd928a3b687fa1168f6eed99f8990ca7c8" },
    daniel:  { salt: "984069c61d40f51f", hash: "c21c6e47876dee3d106f47462caedba1185c3899041ab120c02cf9d58bc2b07c" }
  };
  const SESSION_KEY = "reder.auth.user.v2";

  async function sha256Hex(str) {
    const buf = new TextEncoder().encode(str);
    const digest = await crypto.subtle.digest("SHA-256", buf);
    return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function verifyAuth(user, pass) {
    const u = AUTH_USERS[user];
    if (!u) {
      // constant-time-ish: still compute a hash so timing doesn't leak user existence
      await sha256Hex("decoy" + pass);
      return false;
    }
    const got = await sha256Hex(u.salt + pass);
    return got === u.hash;
  }

  const ICONS = {
    user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c.5-4 4-7 8-7s7.5 3 8 7"/></svg>',
    claude: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5l1.4 7.5L21 7.6l-5.6 4.4L21 16.4l-7.6-1.4L12 22.5l-1.4-7.5L3 16.4l5.6-4.4L3 7.6l7.6 1.4z"/></svg>',
    gemini: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5c.4 4.5 3 9 9 10.5-6 1.5-8.6 6-9 10.5-.4-4.5-3-9-9-10.5 6-1.5 8.6-6 9-10.5z"/></svg>',
    image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/><path d="M21 16l-5-5L5 19"/></svg>',
    video: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11.5-6.86a1 1 0 0 0 0-1.72L9.5 4.28A1 1 0 0 0 8 5.14z"/></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="17" r=".8" fill="currentColor"/></svg>'
  };

  // ── Boot ─────────────────────────────────────────────
  const gateEl = document.getElementById("authGate");
  const appEl = document.getElementById("app");
  const stored = localStorage.getItem(SESSION_KEY);
  if (stored && AUTH_USERS[stored]) {
    runApp(stored);
  } else {
    showGate();
  }

  function showGate() {
    appEl.hidden = true;
    gateEl.classList.remove("hidden");
    setTimeout(() => document.getElementById("authUser").focus(), 60);

    const form = document.getElementById("authForm");
    const errEl = document.getElementById("authErr");
    const userEl = document.getElementById("authUser");
    const passEl = document.getElementById("authPass");
    const btn = document.getElementById("authBtn");
    const eyeBtn = document.getElementById("authEye");

    eyeBtn.addEventListener("click", () => {
      const showing = passEl.type === "text";
      passEl.type = showing ? "password" : "text";
      eyeBtn.classList.toggle("on", !showing);
      eyeBtn.title = showing ? "Show password" : "Hide password";
      passEl.focus();
    });

    if (!window.crypto || !crypto.subtle || !crypto.subtle.digest) {
      errEl.textContent = "Browser does not support secure auth (Web Crypto). Use a recent Chrome/Firefox/Safari.";
      btn.disabled = true;
      return;
    }

    // Invite link support: #u=<user>&p=<password> prefills (and auto-submits if both given).
    // Hash is cleared from the URL after handling so it doesn't sit in the address bar.
    const inviteHash = location.hash.startsWith("#") ? location.hash.slice(1) : "";
    if (inviteHash) {
      const params = new URLSearchParams(inviteHash);
      const inviteUser = params.get("u");
      const invitePass = params.get("p");
      if (inviteUser) {
        userEl.value = inviteUser;
        history.replaceState(null, "", location.pathname + location.search);
        if (invitePass) {
          passEl.value = invitePass;
          setTimeout(() => {
            if (typeof form.requestSubmit === "function") form.requestSubmit();
            else btn.click();
          }, 30);
        } else {
          setTimeout(() => passEl.focus(), 60);
        }
      }
    }

    form.addEventListener("submit", async e => {
      e.preventDefault();
      errEl.textContent = "";
      const user = userEl.value.trim().toLowerCase();
      const pass = passEl.value.trim();
      if (!user || !pass) return;
      btn.disabled = true; btn.textContent = "…";
      try {
        const ok = await verifyAuth(user, pass);
        if (ok) {
          localStorage.setItem(SESSION_KEY, user);
          gateEl.classList.add("hidden");
          appEl.hidden = false;
          runApp(user);
        } else {
          errEl.textContent = "Wrong username or password.";
          passEl.value = "";
          passEl.focus();
        }
      } catch (err) {
        errEl.textContent = "Auth error: " + (err.message || err);
      } finally {
        btn.disabled = false; btn.textContent = "Enter →";
      }
    });
  }

  // ── App (per-user) ───────────────────────────────────
  function runApp(currentUser) {
    appEl.hidden = false;
    const STORE_KEY = "reder.v1." + currentUser;
    // Temp default for the next few days — strip / change once we move webhooks.
    const DEFAULT_WEBHOOK = "https://n8n.jeremias-groehl.de/webhook/ai-chat";

    const $ = id => document.getElementById(id);
    const sidebarEl = $("sidebar");
    const backdropEl = $("backdrop");
    const sidebarCloseBtn = $("sidebarCloseBtn");
    const menuToggle = $("menuToggle");
    const webhookUrlEl = $("webhookUrl");
    const modelEl = $("modelSelect");
    const systemEl = $("systemPrompt");
    const newSessionBtn = $("newSessionBtn");
    const sessionsListEl = $("sessionsList");
    const topbarTitleEl = $("topbarTitle");
    const currentModelEl = $("currentModel");
    const clearBtn = $("clearBtn");
    const exportBtn = $("exportBtn");
    const messagesEl = $("messages");
    const messagesInner = $("messagesInner");
    const inputEl = $("input");
    const sendBtn = $("sendBtn");
    const attachBtn = $("attachBtn");
    const fileInput = $("fileInput");
    const attachmentsPreview = $("attachmentsPreview");
    const statusDot = $("statusDot");
    const statusText = $("statusText");
    const signedAsEl = $("signedAs");
    const logoutBtn = $("logoutBtn");
    const modelHintEl = $("modelHint");
    const toastEl = $("toast");
    const lightboxEl = $("lightbox");
    const lightboxImg = $("lightboxImg");

    signedAsEl.textContent = "@" + currentUser;

    // ── State ───────────────────────────────────────
    const state = load() || {
      webhookUrl: DEFAULT_WEBHOOK,
      model: "claude-sonnet-4-6",
      systemPrompt: "",
      activeSessionId: null,
      sessions: {}
    };
    if (!state.webhookUrl) state.webhookUrl = DEFAULT_WEBHOOK;
    if (!state.activeSessionId || !state.sessions[state.activeSessionId]) {
      const id = newSessionId();
      state.sessions[id] = blankSession(id);
      state.activeSessionId = id;
    }
    for (const id of Object.keys(state.sessions)) {
      const s = state.sessions[id];
      if (!s.title) s.title = "";
      if (!Array.isArray(s.messages)) s.messages = [];
    }

    let pendingAttachments = [];

    webhookUrlEl.value = state.webhookUrl || "";
    modelEl.value = state.model;
    systemEl.value = state.systemPrompt;

    webhookUrlEl.addEventListener("change", () => { state.webhookUrl = webhookUrlEl.value.trim(); save(); });
    modelEl.addEventListener("change", () => { state.model = modelEl.value; currentModelEl.textContent = state.model; modelHintEl.textContent = state.model; save(); });
    systemEl.addEventListener("change", () => { state.systemPrompt = systemEl.value; save(); });
    newSessionBtn.addEventListener("click", () => createSession());
    clearBtn.addEventListener("click", () => {
      if (confirm("Clear all messages in this session?")) clearActiveSession();
    });
    exportBtn.addEventListener("click", exportActiveSession);
    logoutBtn.addEventListener("click", () => {
      if (!confirm("Log out " + currentUser + "?")) return;
      localStorage.removeItem(SESSION_KEY);
      location.reload();
    });

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    inputEl.addEventListener("input", autosize);
    inputEl.addEventListener("paste", handlePaste);
    sendBtn.addEventListener("click", send);
    attachBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", e => addAttachments(e.target.files));

    menuToggle.addEventListener("click", () => toggleSidebar(true));
    sidebarCloseBtn.addEventListener("click", () => toggleSidebar(false));
    backdropEl.addEventListener("click", () => toggleSidebar(false));

    document.addEventListener("keydown", e => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && e.key.toLowerCase() === "n") { e.preventDefault(); createSession(); }
      if (e.key === "Escape") {
        if (lightboxEl.classList.contains("show")) lightboxEl.classList.remove("show");
        else if (sidebarEl.classList.contains("open")) toggleSidebar(false);
      }
    });

    lightboxEl.addEventListener("click", () => lightboxEl.classList.remove("show"));

    render();

    // ── Functions ───────────────────────────────────
    function newSessionId() {
      return "s_" + Math.random().toString(36).slice(2, 8) + "_" + Date.now().toString(36).slice(-4);
    }
    function blankSession(id) { return { id, createdAt: Date.now(), messages: [], title: "" }; }
    function activeSession() { return state.sessions[state.activeSessionId]; }
    function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } }
    function save() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
      catch { console.warn("localStorage full — state kept in memory only"); }
    }

    function createSession() {
      const id = newSessionId();
      state.sessions[id] = blankSession(id);
      state.activeSessionId = id;
      save(); render();
      inputEl.focus();
    }

    function clearActiveSession() {
      activeSession().messages = [];
      activeSession().title = "";
      save(); render();
    }

    function deleteSession(id) {
      delete state.sessions[id];
      if (state.activeSessionId === id) {
        const ids = Object.keys(state.sessions);
        if (ids.length === 0) {
          const nid = newSessionId();
          state.sessions[nid] = blankSession(nid);
          state.activeSessionId = nid;
        } else {
          state.activeSessionId = ids[ids.length - 1];
        }
      }
      save(); render();
    }

    function selectSession(id) {
      state.activeSessionId = id;
      save(); render();
      if (window.innerWidth <= 820) toggleSidebar(false);
    }

    function autosize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + "px";
    }

    function setStatus(kind, text) {
      statusDot.className = "status-dot" + (kind ? " " + kind : "");
      statusText.textContent = text;
    }

    function toggleSidebar(open) {
      sidebarEl.classList.toggle("open", open);
      backdropEl.classList.toggle("show", open);
    }

    function showToast(text, kind = "") {
      toastEl.textContent = text;
      toastEl.className = "toast show" + (kind ? " " + kind : "");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    async function addAttachments(files) {
      const list = Array.from(files || []).filter(f => f.type.startsWith("image/"));
      for (const f of list) {
        try {
          const dataUrl = await fileToDataUrl(f);
          pendingAttachments.push({ name: f.name, type: f.type, dataUrl });
        } catch (e) { console.warn(e); }
      }
      fileInput.value = "";
      renderAttachmentsPreview();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function handlePaste(e) {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imgs = [];
      for (const it of items) {
        if (it.kind === "file" && it.type.startsWith("image/")) {
          const f = it.getAsFile();
          if (f) imgs.push(f);
        }
      }
      if (imgs.length) {
        e.preventDefault();
        addAttachments(imgs);
      }
    }

    function renderAttachmentsPreview() {
      attachmentsPreview.innerHTML = "";
      pendingAttachments.forEach((a, idx) => {
        const chip = document.createElement("div");
        chip.className = "attachment-chip";
        chip.innerHTML = `
          <img class="attachment-thumb" src="${a.dataUrl}" alt="">
          <span class="attachment-name">${escapeHtml(a.name)}</span>
          <button class="attachment-remove" title="Remove">×</button>
        `;
        chip.querySelector(".attachment-remove").addEventListener("click", () => {
          pendingAttachments.splice(idx, 1);
          renderAttachmentsPreview();
        });
        attachmentsPreview.appendChild(chip);
      });
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMarkdown(src) {
      if (!src) return "";
      src = String(src);

      const fences = [];
      src = src.replace(/```([a-zA-Z0-9_+\-]*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const i = fences.push({ lang: lang || "", code }) - 1;
        return ` FENCE${i} `;
      });

      src = escapeHtml(src);
      src = src.replace(/`([^`\n]+?)`/g, (_, c) => `<code>${c}</code>`);

      const lines = src.split(/\r?\n/);
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];

        const h = line.match(/^(#{1,3})\s+(.+)$/);
        if (h) { out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); i++; continue; }

        if (/^---+\s*$/.test(line)) { out.push("<hr>"); i++; continue; }

        if (/^&gt;\s?/.test(line)) {
          const buf = [];
          while (i < lines.length && /^&gt;\s?/.test(lines[i])) {
            buf.push(lines[i].replace(/^&gt;\s?/, ""));
            i++;
          }
          out.push(`<blockquote>${inline(buf.join(" "))}</blockquote>`);
          continue;
        }

        if (/^\s*[-*]\s+/.test(line)) {
          const buf = [];
          while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
            buf.push(lines[i].replace(/^\s*[-*]\s+/, ""));
            i++;
          }
          out.push("<ul>" + buf.map(b => `<li>${inline(b)}</li>`).join("") + "</ul>");
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          const buf = [];
          while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
            buf.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
            i++;
          }
          out.push("<ol>" + buf.map(b => `<li>${inline(b)}</li>`).join("") + "</ol>");
          continue;
        }

        const fence = line.match(/^ FENCE(\d+) $/);
        if (fence) {
          const f = fences[+fence[1]];
          const langLabel = f.lang ? `<span class="lang-label">${escapeHtml(f.lang)}</span>` : "";
          const cls = f.lang ? "has-lang" : "";
          out.push(`<pre class="${cls}">${langLabel}<button class="code-copy" type="button">Copy</button><code>${escapeHtml(f.code.replace(/\n$/, ""))}</code></pre>`);
          i++;
          continue;
        }

        if (/^\s*$/.test(line)) { i++; continue; }

        const buf = [line];
        i++;
        while (
          i < lines.length &&
          !/^\s*$/.test(lines[i]) &&
          !/^#{1,3}\s/.test(lines[i]) &&
          !/^\s*[-*]\s+/.test(lines[i]) &&
          !/^\s*\d+\.\s+/.test(lines[i]) &&
          !/^&gt;\s?/.test(lines[i]) &&
          !/^---+\s*$/.test(lines[i]) &&
          !/^ FENCE\d+ $/.test(lines[i])
        ) {
          buf.push(lines[i]);
          i++;
        }
        out.push(`<p>${inline(buf.join("\n").replace(/\n/g, "<br>"))}</p>`);
      }

      return out.join("");
    }

    function inline(s) {
      s = s.replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/__([^_\n]+?)__/g, "<strong>$1</strong>");
      s = s.replace(/(^|[^*])\*([^*\n]+?)\*/g, "$1<em>$2</em>");
      s = s.replace(/(^|[^_])_([^_\n]+?)_/g, "$1<em>$2</em>");
      s = s.replace(/\[([^\]]+)\]\(((?:https?:|mailto:)[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return s;
    }

    function renderSessions() {
      sessionsListEl.innerHTML = "";
      const ids = Object.keys(state.sessions).sort((a,b) => state.sessions[b].createdAt - state.sessions[a].createdAt);
      for (const id of ids) {
        const s = state.sessions[id];
        const item = document.createElement("div");
        item.className = "session-item" + (id === state.activeSessionId ? " active" : "");
        const title = s.title || autoTitle(s) || "New chat";
        item.innerHTML = `
          <div class="session-meta">
            <div class="session-title" title="Double-click to rename">${escapeHtml(title)}</div>
            <div class="session-sub">${escapeHtml(id.replace(/^s_/, ""))} · ${s.messages.length} msg${s.messages.length === 1 ? "" : "s"}</div>
          </div>
          <div class="session-actions">
            <button class="session-action" data-action="rename" title="Rename">✎</button>
            <button class="session-action danger" data-action="delete" title="Delete">✕</button>
          </div>
        `;
        const titleEl = item.querySelector(".session-title");
        item.addEventListener("click", e => {
          if (e.target.closest(".session-action") || titleEl.isContentEditable) return;
          selectSession(id);
        });
        titleEl.addEventListener("dblclick", e => { e.stopPropagation(); startRename(titleEl, id); });
        item.querySelector('[data-action="rename"]').addEventListener("click", e => {
          e.stopPropagation();
          if (id !== state.activeSessionId) selectSession(id);
          startRename(titleEl, id);
        });
        item.querySelector('[data-action="delete"]').addEventListener("click", e => {
          e.stopPropagation();
          if (confirm("Delete this session?")) deleteSession(id);
        });
        sessionsListEl.appendChild(item);
      }
    }

    function startRename(el, id) {
      el.contentEditable = "true";
      el.focus();
      const sel = document.getSelection();
      sel.selectAllChildren(el);
      const finish = (commit) => {
        el.contentEditable = "false";
        el.removeEventListener("keydown", onKey);
        el.removeEventListener("blur", onBlur);
        if (commit) {
          const v = el.textContent.trim();
          state.sessions[id].title = v;
          save();
        }
        render();
      };
      const onKey = (e) => {
        if (e.key === "Enter") { e.preventDefault(); finish(true); }
        if (e.key === "Escape") { e.preventDefault(); finish(false); }
      };
      const onBlur = () => finish(true);
      el.addEventListener("keydown", onKey);
      el.addEventListener("blur", onBlur);
    }

    function autoTitle(s) {
      const firstUser = s.messages.find(m => m.role === "user");
      if (!firstUser) return "";
      return firstUser.content.replace(/^\/\w+\s*/, "").slice(0, 40).trim();
    }

    function renderMessages() {
      const s = activeSession();
      messagesInner.innerHTML = "";
      if (s.messages.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = `
          <div class="empty-icon">◇</div>
          <div class="empty-title">Hi @${escapeHtml(currentUser)} — sag was.</div>
          <div class="empty-sub">Talking to <strong>${escapeHtml(state.model)}</strong> via your n8n webhook. Start with a prompt or pick one below.</div>
          <div class="empty-prompts">
            <button class="empty-prompt" data-prompt="Erkläre mir Feature-Sliced Design in drei Sätzen.">Erkläre FSD</button>
            <button class="empty-prompt" data-prompt="/image a warm, cosy reading nook at golden hour, codex aesthetic">/image cosy nook</button>
            <button class="empty-prompt" data-prompt="Schreib einen kurzen Haiku über n8n.">Haiku über n8n</button>
            <button class="empty-prompt" data-prompt="Was ist heute in der KI-Welt los?">News-Briefing</button>
          </div>
        `;
        empty.querySelectorAll(".empty-prompt").forEach(btn => {
          btn.addEventListener("click", () => {
            inputEl.value = btn.dataset.prompt;
            autosize(); inputEl.focus();
          });
        });
        messagesInner.appendChild(empty);
        return;
      }
      for (const m of s.messages) appendMessage(m);
      scrollToBottom();
    }

    function avatarKindFor(m) {
      if (m.role === "user") return "user";
      if (m.role === "error") return "error";
      if (m.type === "image") return "image";
      if (m.type === "video") return "video";
      const model = (m.model || state.model || "").toLowerCase();
      if (model.startsWith("claude")) return "claude";
      if (model.startsWith("gemini") || model.startsWith("veo")) return "gemini";
      return "claude";
    }

    function authorFor(m) {
      if (m.role === "user") return "You";
      if (m.role === "error") return "Error";
      if (m.type === "image") return "Image";
      if (m.type === "video") return "Video";
      const model = (m.model || state.model || "").toLowerCase();
      if (model.startsWith("claude")) return "Claude";
      if (model.startsWith("gemini")) return "Gemini";
      if (model.startsWith("veo")) return "Veo";
      return "Assistant";
    }

    function fmtTime(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const today = new Date();
      const sameDay = d.toDateString() === today.toDateString();
      const t = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      return sameDay ? t : d.toLocaleDateString([], { day: "2-digit", month: "short" }) + " " + t;
    }

    function appendMessage(m, animate = false) {
      const empty = messagesInner.querySelector(".empty-state");
      if (empty) empty.remove();

      const div = document.createElement("div");
      div.className = "msg " + m.role;
      const kind = avatarKindFor(m);
      const author = authorFor(m);
      const showModel = (m.role === "assistant" || m.type === "image" || m.type === "video");
      const modelLabel = showModel ? (m.model || state.model) : "";
      div.innerHTML = `
        <div class="msg-avatar ${kind}">${ICONS[kind]}</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-author">${author}</span>
            ${modelLabel ? `<span class="msg-model">${escapeHtml(modelLabel)}</span>` : ""}
            ${m.ts ? `<span class="msg-time">${fmtTime(m.ts)}</span>` : ""}
          </div>
          <div class="msg-bubble"></div>
          <div class="msg-tools"></div>
        </div>
      `;
      const bubble = div.querySelector(".msg-bubble");
      const tools = div.querySelector(".msg-tools");

      if (m.type === "image" && m.imageUrl) {
        if (m.content) {
          const cap = document.createElement("div");
          cap.className = "msg-caption";
          cap.textContent = m.content;
          bubble.appendChild(cap);
        }
        const media = document.createElement("div");
        media.className = "msg-media";
        const img = document.createElement("img");
        img.src = m.imageUrl;
        img.alt = m.content || "generated image";
        img.addEventListener("click", () => openLightbox(m.imageUrl));
        img.addEventListener("error", () => {
          const fallback = document.createElement("div");
          fallback.style.cssText = "padding:10px;border:1px dashed var(--error);border-radius:8px;color:var(--error);font-size:12px;font-family:ui-monospace,monospace;word-break:break-all;line-height:1.5;";
          fallback.textContent = "Image failed to load · " + img.src.slice(0, 200) + (img.src.length > 200 ? "…" : "");
          img.replaceWith(fallback);
        });
        media.appendChild(img);
        bubble.appendChild(media);
      } else if (m.type === "video" && m.videoUrl) {
        if (m.content) {
          const cap = document.createElement("div");
          cap.className = "msg-caption";
          cap.textContent = m.content;
          bubble.appendChild(cap);
        }
        const media = document.createElement("div");
        media.className = "msg-media";
        const vid = document.createElement("video");
        vid.src = m.videoUrl;
        vid.controls = true;
        vid.playsInline = true;
        media.appendChild(vid);
        bubble.appendChild(media);
      } else if (m.role === "assistant") {
        bubble.classList.add("md");
        bubble.innerHTML = renderMarkdown(m.content || "");
        bubble.querySelectorAll(".code-copy").forEach(btn => {
          btn.addEventListener("click", () => {
            const code = btn.parentElement.querySelector("code")?.innerText || "";
            navigator.clipboard.writeText(code).then(() => {
              btn.textContent = "Copied";
              btn.classList.add("copied");
              setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1200);
            });
          });
        });
      } else {
        bubble.textContent = m.content || "";
        if (m.role === "user" && Array.isArray(m.attachments) && m.attachments.length) {
          const wrap = document.createElement("div");
          wrap.className = "msg-attachments";
          for (const a of m.attachments) {
            if (a.dataUrl && a.type?.startsWith("image/")) {
              const img = document.createElement("img");
              img.src = a.dataUrl;
              img.alt = a.name || "";
              img.addEventListener("click", () => openLightbox(a.dataUrl));
              wrap.appendChild(img);
            }
          }
          bubble.appendChild(wrap);
        }
      }

      if (m.role !== "error") {
        const copyBtn = document.createElement("button");
        copyBtn.className = "msg-tool";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(m.content || "").then(() => {
            copyBtn.textContent = "Copied";
            copyBtn.classList.add("copied");
            setTimeout(() => { copyBtn.textContent = "Copy"; copyBtn.classList.remove("copied"); }, 1200);
          });
        });
        tools.appendChild(copyBtn);
      }
      if (m.role === "user") {
        const retryBtn = document.createElement("button");
        retryBtn.className = "msg-tool";
        retryBtn.textContent = "Resend";
        retryBtn.addEventListener("click", () => {
          inputEl.value = m.content;
          autosize(); inputEl.focus();
        });
        tools.appendChild(retryBtn);
      }

      messagesInner.appendChild(div);
      if (animate) scrollToBottom();
      return div;
    }

    function appendTyping(intent) {
      const div = document.createElement("div");
      div.className = "msg assistant typing-row";
      const kind = intent === "image" ? "image" : (intent === "video" ? "video" : (state.model.startsWith("claude") ? "claude" : "gemini"));
      const author = intent === "image" ? "Image" : (intent === "video" ? "Video" : (state.model.startsWith("claude") ? "Claude" : "Gemini"));
      const label = intent === "image" ? "image-gen" : (intent === "video" ? "video-gen" : state.model);
      div.innerHTML = `
        <div class="msg-avatar ${kind}">${ICONS[kind]}</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-author">${author}</span>
            <span class="msg-model">${escapeHtml(label)}</span>
          </div>
          <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
        </div>
      `;
      messagesInner.appendChild(div);
      scrollToBottom();
      return div;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
    }

    function updateMsgCount() {
      // msgCount slot is reused by signed-as; show count via title on author chip instead — keep minimal
    }

    function updateTopbarTitle() {
      const s = activeSession();
      topbarTitleEl.textContent = s.title || autoTitle(s) || "New chat";
    }

    function render() {
      updateTopbarTitle();
      currentModelEl.textContent = state.model;
      modelHintEl.textContent = state.model;
      renderSessions();
      renderMessages();
    }

    function openLightbox(src) {
      lightboxImg.src = src;
      lightboxEl.classList.add("show");
    }

    function parseWebhookResponse(data) {
      // Accept many shapes returned by different n8n flows / providers.
      const m = (data && (data.message || data.msg)) || {};
      let imageUrl = m.imageUrl || m.image_url || m.image || data.imageUrl || data.image_url || data.image || null;
      let videoUrl = m.videoUrl || m.video_url || m.video || data.videoUrl || data.video_url || data.video || null;
      let content = m.content || m.text || data.content || data.text || data.output || data.response || "";
      let type = m.type || data.type || null;
      const model = data.model || m.model || null;

      // If content is itself an image (data URL or direct image link), promote it.
      if (typeof content === "string") {
        const trimmed = content.trim();
        if (!imageUrl && /^data:image\//i.test(trimmed)) { imageUrl = trimmed; content = ""; }
        else if (!imageUrl && /^https?:\/\/\S+\.(png|jpe?g|gif|webp|svg)(\?\S*)?$/i.test(trimmed)) { imageUrl = trimmed; content = ""; }
        else if (!videoUrl && /^https?:\/\/\S+\.(mp4|webm|mov)(\?\S*)?$/i.test(trimmed)) { videoUrl = trimmed; content = ""; }
      }

      // base64 without data: prefix? wrap it.
      if (imageUrl && /^[A-Za-z0-9+/=]{200,}$/.test(imageUrl)) {
        imageUrl = "data:image/png;base64," + imageUrl;
      }

      if (!type) {
        if (imageUrl) type = "image";
        else if (videoUrl) type = "video";
        else type = "text";
      }
      if (!content && type === "text") content = "(empty response)";

      const out = { role: "assistant", content, type };
      if (imageUrl) out.imageUrl = imageUrl;
      if (videoUrl) out.videoUrl = videoUrl;
      if (model) out.model = model;
      return out;
    }

    function exportActiveSession() {
      const s = activeSession();
      if (!s.messages.length) { showToast("Nothing to export", "err"); return; }
      const title = s.title || autoTitle(s) || "reder-session";
      const lines = [`# ${title}`, "", `_Exported ${new Date().toISOString()} · model ${state.model} · @${currentUser}_`, ""];
      for (const m of s.messages) {
        const who = m.role === "user" ? `**@${currentUser}**` : (m.role === "error" ? "**Error**" : `**${authorFor(m)}** _(${m.model || state.model})_`);
        lines.push(`### ${who}`);
        if (m.type === "image" && m.imageUrl) lines.push(`![image](${m.imageUrl})`);
        else if (m.type === "video" && m.videoUrl) lines.push(`[video](${m.videoUrl})`);
        lines.push(m.content || "");
        if (m.role === "user" && m.attachments?.length) {
          for (const a of m.attachments) lines.push(`_(attached: ${a.name})_`);
        }
        lines.push("");
      }
      const blob = new Blob([lines.join("\n")], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = title.replace(/[^\w-]+/g, "_").slice(0, 60) + ".md";
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast("Exported", "ok");
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text && pendingAttachments.length === 0) return;
      if (!state.webhookUrl) { showToast("Set the webhook URL first", "err"); return; }

      const s = activeSession();
      const userMsg = { role: "user", content: text, ts: Date.now() };
      if (pendingAttachments.length) userMsg.attachments = pendingAttachments.slice();
      s.messages.push(userMsg);
      if (!s.title) s.title = autoTitle(s);
      save();
      appendMessage(userMsg, true);
      updateTopbarTitle();
      renderSessions();
      inputEl.value = "";
      const sentAttachments = pendingAttachments.slice();
      pendingAttachments = [];
      renderAttachmentsPreview();
      autosize();

      sendBtn.disabled = true;
      setStatus("busy", "thinking…");
      const intent = /^\s*\/image\s+/i.test(text) ? "image" : (/^\s*\/video\s+/i.test(text) ? "video" : "chat");
      const typingEl = appendTyping(intent);

      try {
        const payload = {
          sessionId: s.id,
          user: currentUser,
          model: state.model,
          systemPrompt: state.systemPrompt || "You are a helpful assistant.",
          messages: s.messages.map(m => ({
            role: m.role,
            content: m.content,
            ...(m.attachments ? { attachments: m.attachments } : {})
          })),
          attachments: sentAttachments
        };
        const res = await fetch(state.webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        typingEl.remove();
        if (!res.ok) {
          const errText = await res.text().catch(() => "");
          throw new Error("HTTP " + res.status + (errText ? " · " + errText.slice(0, 200) : ""));
        }
        const data = await res.json();
        console.debug("reder ← webhook response:", data);
        const aiMsg = parseWebhookResponse(data);
        aiMsg.ts = Date.now();
        if (!aiMsg.model) aiMsg.model = state.model;
        s.messages.push(aiMsg);
        save();
        appendMessage(aiMsg, true);
        renderSessions();
        setStatus("ok", "ok");
      } catch (err) {
        typingEl.remove();
        const errMsg = { role: "error", content: err.message || String(err), ts: Date.now() };
        s.messages.push(errMsg);
        save();
        appendMessage(errMsg, true);
        setStatus("err", "error");
        showToast("Request failed", "err");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  }
})();
</script>
</body>
</html>
